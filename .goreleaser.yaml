# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: dolphin-ai

before:
  hooks:
    - go mod tidy
    - go vet ./...

builds:
  - binary: dolphin-ai
    main: .
    ldflags:
      - -s -w -X 'dolphin/cmd.Version={{.Version}}'
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    goarm:
      - 8
    ignore:
      - goos: darwin
        goarch: amd64
        goarm: 8

archives:
  - formats: tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- if eq .Os "darwin" }}macOS
      {{- else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats: zip
    files:
      - README.md
      - LICENSE*

nfpms:
  - id: default
    package_name: dolphin
    file_name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    vendor: dolphinZzv
    homepage: https://github.com/dolphinZzv/dolphin
    maintainer: dolphinZzv <dolphin@siciv.space>
    description: |
      dolphin is an AI agent platform with multi-agent coordination,
      MCP tool integration, skills, cron tasks, and multi-provider LLM support.
    license: MIT
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/bin
    section: devel
    recommends:
      - git
    overrides:
      deb:
        suggests:
          - chromium-browser
      rpm:
        suggests:
          - chromium
      apk:
        recommends:
          - chromium

brews:
  - name: dolphin-ai
    repository:
      owner: dolphinZzv
      name: homebrew-dolphin
    commit_author:
      name: dolphinZzv
      email: dolphin@siciv.space
    homepage: https://github.com/dolphinZzv/dolphin
    description: |
      dolphin-ai is an AI agent platform with multi-agent coordination,
      MCP tool integration, skills, cron tasks, and multi-provider LLM support.
    license: MIT
    dependencies:
      - name: git
    caveats: |
      dolphin-ai is installed. Run `dolphin-ai setup` to get started.

      For CDP browser automation, install chromium or google-chrome.
      See https://github.com/dolphinZzv/dolphin for documentation.

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Version }}-SNAPSHOT-{{ .ShortCommit }}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore"
      - gofmt

release:
  github:
    owner: dolphinZzv
    name: dolphin
  draft: true
  make_latest: false
