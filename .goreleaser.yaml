# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: dolphin

before:
  hooks:
    - go mod tidy
    - go vet ./...

builds:
  - binary: dolphin
    main: .
    ldflags:
      - -s -w -X 'dolphin/cmd.Version={{.Version}}'
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    goarm:
      - 8
    ignore:
      - goos: darwin
        goarch: amd64
        goarm: 8

archives:
  - formats: tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- if eq .Os "darwin" }}macOS
      {{- else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats: zip
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: "checksums.txt"

snapshot:
  name_template: "{{ .Version }}-SNAPSHOT-{{ .ShortCommit }}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore"
      - gofmt

release:
  github:
    owner: dolphin
    name: dolphin
  draft: true
  make_latest: false
