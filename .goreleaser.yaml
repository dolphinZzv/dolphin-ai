version: 2

project_name: dolphin

before:
  hooks:
    - go mod tidy

builds:
  - id: dolphin
    main: ./cmd/dolphin
    binary: dolphin
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X dolphin/internal/command.Version={{.Version}}

  - id: mail
    main: ./cli/mail
    binary: bin/mail
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: ["tar.gz"]
    builds:
      - dolphin
      - mail
    files:
      - none*

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
