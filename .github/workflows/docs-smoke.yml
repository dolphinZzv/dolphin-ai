name: Docs Smoke Test

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '*.md'
      - 'docs/**'
      - 'design/**'
      - 'workflow/**'
  pull_request:
    branches: [main]
    paths:
      - '*.md'
      - 'docs/**'
      - 'design/**'
      - 'workflow/**'

jobs:
  docs-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run docs smoke test
        run: scripts/docs-smoke.sh
