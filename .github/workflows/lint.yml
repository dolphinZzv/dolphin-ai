name: Lint

on:
  schedule:
    - cron: "37 20 * * *"
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    container: golang:1.26
    steps:
      - uses: actions/checkout@v4

      - name: Run golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
          golangci-lint run ./...
