name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  ci-check:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CI to complete
        run: |
          echo "CI must pass before release. Ensure all tests pass on main before pushing tag."

  goreleaser:
    runs-on: ubuntu-latest
    needs: [ci-check]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}