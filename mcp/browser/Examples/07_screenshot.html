<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Screenshot Test</title>
<style>
  body { font-family: -apple-system, sans-serif; padding: 2em; }
  .card { display: inline-block; width: 200px; height: 200px; margin: 1em; border-radius: 12px; }
  .red { background: linear-gradient(135deg, #ff6b6b, #ee5a24); }
  .blue { background: linear-gradient(135deg, #74b9ff, #0984e3); }
  .green { background: linear-gradient(135deg, #55efc4, #00b894); }
  .yellow { background: linear-gradient(135deg, #ffeaa7, #fdcb6e); }
  .purple { background: linear-gradient(135deg, #a29bfe, #6c5ce7); }
  h1 { color: #333; }
</style>
</head>
<body>
  <h1>Screenshot Test</h1>
  <p>This page has colorful cards for screenshot testing.</p>
  <div class="card red"></div>
  <div class="card blue"></div>
  <div class="card green"></div>
  <div class="card yellow"></div>
  <div class="card purple"></div>
</body>
</html>
