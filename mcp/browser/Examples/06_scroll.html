<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scroll Test</title>
<style>
  body { font-family: -apple-system, sans-serif; padding: 2em; max-width: 600px; margin: 0 auto; }
  .block { height: 800px; border-bottom: 2px solid #eee; padding-top: 2em; }
  .block:nth-child(odd) { background: #f9f9f9; }
</style>
</head>
<body>
  <h1>Scroll Test Page</h1>
  <p>This page has multiple tall blocks to test scrolling.</p>

  <div class="block" id="block1">
    <h2>Block 1</h2>
    <p>Scroll down to see more blocks.</p>
  </div>
  <div class="block" id="block2">
    <h2>Block 2</h2>
    <p>Keep going...</p>
  </div>
  <div class="block" id="block3">
    <h2>Block 3</h2>
    <p>Almost there...</p>
  </div>
  <div class="block" id="block4">
    <h2>Block 4</h2>
    <p>You reached the bottom!</p>
    <button onclick="alert('Bottom reached!')">Click me</button>
  </div>
</body>
</html>
