# dolphin 配置文件
# 复制到 .dolphin/config.yaml，修改后重启生效。
# 所有设置都有默认值 — 只需取消注释需要修改的部分。

# ── LLM 提供商 ────────────────────────────────────────────
# 中国地区推荐 DeepSeek / MiniMax / 智谱 GLM / 通义千问 / Kimi 等。
# 配置多个 provider 时，启动时会逐个检测，自动选择第一个可用的。
llm:
  # 单 provider（兼容原有配置和 DZ_LLM_* 环境变量）：
  type: openai                # "openai" 或 "anthropic"
  base_url: https://api.deepseek.com/v1
  model: deepseek-v4-flash
  api_key: ""                 # 建议通过环境变量 DZ_LLM_API_KEY 设置
  max_tokens: 4096
  max_context_tokens: 1048576 # 超过 70% 时触发上下文压缩
  temperature: 0.7            # 0.0–2.0
  max_sub_turns: 10           # 每轮用户输入最多工具调用反馈循环次数
  compress_mode: drop         # "drop" | "segment" | "tiered" | "incremental" | "topic"
  segment_merge_limit: 100    # segment 模式下的递归合并阈值

  # 多 provider：取消注释并填入 API key，启动时自动选可用的。
  # providers:
  #   - name: deepseek
  #     type: openai
  #     api_key: ""
  #     base_url: https://api.deepseek.com/v1
  #     model: deepseek-v4-flash
  #   - name: minimax
  #     type: openai
  #     api_key: ""
  #     base_url: https://api.minimax.chat/v1
  #     model: MiniMax-M2.7
  #   - name: glm
  #     type: openai
  #     api_key: ""
  #     base_url: https://open.bigmodel.cn/api/paas/v4
  #     model: glm-5
  #   - name: qwen
  #     type: openai
  #     api_key: ""
  #     base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  #     model: qwen3.6-max-preview
  #   - name: kimi
  #     type: openai
  #     api_key: ""
  #     base_url: https://api.moonshot.ai/v1
  #     model: kimi-k2.6

# ── 会话 ──────────────────────────────────────────────────
session:
  dir: .dolphin/sessions
  max_loop: 50                # 每次会话最大轮数
  summary: true               # 自动生成会话摘要
  max_age: 24h                # 超过此时间的会话文件自动清理
  resume: false               # 启动时是否提示恢复上次会话

# ── MCP 工具 ──────────────────────────────────────────────
mcp:
  shell:
    enabled: true
    timeout_seconds: 30
    priority: 10
  cdp:
    enabled: true             # 浏览器自动化（Chrome DevTools Protocol）
    headless: true
    priority: 1000
    idle_timeout: 300         # 空闲多少秒后自动关闭浏览器
  email:
    enabled: true             # 邮件发送/搜索/读取 MCP 工具（使用 transport.email 配置）
    priority: 500
  servers: {}                 # 外部 MCP 服务器，如 myserver: {type: stdio, command: npx, args: [...]}
  repos: []                   # 清单仓库，如 ["dolphinv/mcp"]

# ── Agent 池 ──────────────────────────────────────────────
agent_pool:
  max_concurrency: 5          # 最大并发子 agent 任务数
  default_timeout: 300        # 每个任务的超时秒数
  workspace_dir: .dolphin/workspaces
  idle_timeout: 600           # 空闲临时 agent 多久后被回收（秒）
  max_pending_results: 10
  max_pending_result_len: 500 # prompt 中每条结果最大字符数，0 = 不截断

# ── 技能 ──────────────────────────────────────────────────
skills:
  dir: .dolphin/skills
  max_top: 10                 # LLM 上下文中展示的技能数
  repos: []                   # 清单仓库，如 ["dolphinv/skills"]

# ── 传输层 ────────────────────────────────────────────────
transport:
  stdio:
    enabled: true
  ssh:
    enabled: false
    addr: ":2222"
    host_key: "~/.ssh/id_ed25519"
    username: dolphin
    password: ""              # 首次 SSH 启动时自动生成
  mqtt:
    enabled: false
    broker: tcp://localhost:1883
    topic: dolphin/agent/command
    response_topic: dolphin/agent/response
    client_id: dolphin-agent
  email:
    enabled: false
    smtp_host: ""
    smtp_port: 587
    imap_host: ""
    imap_port: 993
    username: ""
    password: ""              # 建议通过环境变量 DZ_EMAIL_PASSWORD 设置
    from: ""
    use_tls: true
    poll_interval: 10s

# ── 定时任务 ──────────────────────────────────────────────
crontab:
  file: .dolphin/CRONTAB.md
  check_interval: 30s

# ── 日记（会话摘要聚合）───────────────────────────────────
diary:
  dir: .dolphin/diary
  max_day_sessions: 200       # 每天最多保留的会话数
  max_week_days: 7            # 每周最多保留的天数
  max_month_weeks: 5          # 每月最多保留的周数
  max_year_months: 12         # 每年最多保留的月数
  max_total_mb: 500           # 日记总大小上限，超出则删除最旧年份

# ── 插件（Hook + Event 扩展系统）────────────────────────────
# dolphin 提供两套扩展机制：
#
#   Hook（同步）— 在 agent 循环的特定节点拦截执行。
#                 在可中止的节点返回错误可中断流程。
#   Event（异步）— 订阅后台分发的事件通知。
#                  内置投递方式：Webhook（HTTP POST）、JSONL 日志。
#
# 两种机制均可通过放置在插件目录下的脚本驱动。

plugins:
  enabled: true
  dir: ~/.dolphin/plugins/       # 脚本插件目录

  # ── 事件 Webhook ──────────────────────────────────────────
  # 将选定事件以 JSON 格式 POST 到 HTTP 端点。
  webhook_url: ""                 # 如 "https://hooks.example.com/dolphin"
  webhook_events: ["*"]           # 投递的事件类型，["*"] = 全部

  # 可用事件：
  #   session:created    session:ended
  #   user:message       llm:response
  #   tool:called        tool:completed
  #   compression        error
  #   heartbeat          agent:dispatched   agent:completed
  #   skill:loaded
  #
  # 示例：只投递工具和 agent 事件：
  # webhook_events: ["tool:called", "tool:completed", "agent:dispatched", "agent:completed"]

  # ── 心跳 ──────────────────────────────────────────────────
  # 每 N 轮触发一次 heartbeat 事件（0 = 关闭）。
  heartbeat_turns: 0              # 如 5 = 每 5 轮发一次心跳

# ── Hook 插件脚本示例 ────────────────────────────────────
# 将可执行脚本或 .md 文件放入 ~/.dolphin/plugins/。
# 每个脚本从 stdin 接收 hook 上下文的 JSON，可在 stdout 返回修改后的 JSON。
#
# 可用 Hook 节点（† = 可中止）：
#   session:start    session:end      user:input†
#   llm:before†      llm:after        tool:before†
#   tool:after       response:before  error
#
# ── 示例脚本 ─────────────────────────────────────────────
#
# --- ~/.dolphin/plugins/audit-input.sh ---
# #!/bin/bash
# # 记录用户输入到日志文件。
# # Hook 节点: user:input
# read -r json
# echo "$json" | jq '.user_input' >> /var/log/dolphin-input.log
# echo "$json"    # 原样透传
#
# --- ~/.dolphin/plugins/session-start.sh ---
# #!/bin/bash
# # 会话开始时通知外部系统。
# # Hook 节点: session:start
# read -r json
# session_id=$(echo "$json" | jq -r '.session_id')
# curl -sf -X POST "https://hooks.example.com/session/start" \
#   -H "Content-Type: application/json" \
#   -d "{\"session_id\": \"$session_id\"}" &>/dev/null
# echo "$json"

# ── 可观测性 ──────────────────────────────────────────────
log_level: info
log_file: .dolphin/logs/agent.log

pprof:
  enabled: false
  addr: ":6060"

metrics:
  enabled: false
  addr: ":9090"
