baseURL: /
title: Dolphin
theme: dolphin
defaultContentLanguage: en
defaultContentLanguageInSubdir: false

# Multilingual
languages:
  en:
    languageName: English
    weight: 1
    title: Dolphin — AI Agent
    contentDir: content/en
    params:
      description: An AI agent that lives where you work — terminal, email, chat, or SSH
      footer: Documentation for Dolphin AI Agent
  zh:
    languageName: 中文
    weight: 2
    title: 小海豚 — AI Agent
    contentDir: content/zh
    params:
      description: 一个在你工作环境中无处不在的 AI Agent — 终端、邮件、聊天或 SSH
      footer: 小海豚 AI Agent 文档

# Markdown
markup:
  goldmark:
    renderer:
      unsafe: true
    parser:
      autoHeadingID: true
  highlight:
    style: monokai
    noClasses: false
  tableOfContents:
    endLevel: 4

disableKinds:
  - taxonomy
  - term
  - RSS
  - sitemap
  - robotsTXT

permalinks:
  docs: /docs/:slug/
