<footer>
  <div class="footer-inner">
    <div class="footer-row">
      <div class="theme-toggle">
        <button class="theme-btn theme-btn-auto active" data-theme="auto" title="Auto">A</button>
        <button class="theme-btn theme-btn-light" data-theme="light" title="Light">L</button>
        <button class="theme-btn theme-btn-dark" data-theme="dark" title="Dark">D</button>
      </div>
      <div class="lang-switch">
        {{ $langCount := len .AllTranslations }}
        {{ range $i, $t := .AllTranslations }}
          <a href="{{ $t.RelPermalink }}"{{ if eq $t.Language.Lang $.Site.Language.Lang }} class="active"{{ end }}>{{ $t.Language.LanguageName }}</a>
          {{ if lt $i (sub $langCount 1) }}<span>|</span>{{ end }}
        {{ end }}
      </div>
    </div>
    <p>{{ .Site.Params.footer }}</p>
  </div>
</footer>
