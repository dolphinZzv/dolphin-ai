{{ define "main" }}
<h1>{{ .Title }}</h1>

{{ if .Params.description }}
<p>{{ .Params.description }}</p>
{{ end }}

{{ .Content }}

<div class="section-grid">
  {{ range .Pages.ByWeight }}
  <a href="{{ .RelPermalink }}" style="text-decoration: none; color: inherit;">
    <div class="section-card">
      <h3>{{ .Title }}</h3>
      {{ with .Params.description }}<p>{{ . }}</p>{{ end }}
    </div>
  </a>
  {{ end }}
</div>
{{ end }}
