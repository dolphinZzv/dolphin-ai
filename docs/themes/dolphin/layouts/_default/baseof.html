<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ .Params.description | default .Site.Params.description }}">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐬</text></svg>">
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js" defer></script>
  {{ block "extrahead" . }}{{ end }}
</head>
<body>
  {{ partial "nav.html" . }}
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
  <script src="/js/copy.js"></script>
  <script>
    (function() {
      var root = document.documentElement;
      var mermaidDark = false;

      function applyTheme(t) {
        root.classList.remove('theme-auto', 'theme-light', 'theme-dark');
        root.classList.add('theme-' + t);
        localStorage.setItem('dolphin-theme', t);
        mermaidDark = t === 'dark' || (t === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        updateMermaidTheme();
        document.querySelectorAll('.theme-btn').forEach(function(btn) {
          btn.classList.toggle('active', btn.dataset.theme === t);
        });
      }

      function updateMermaidTheme() {
        if (typeof mermaid !== 'undefined') {
          mermaid.initialize({
            theme: mermaidDark ? 'dark' : 'base',
            themeVariables: { fontFamily: 'inherit' }
          });
          document.querySelectorAll('.mermaid').forEach(function(el) {
            el.removeAttribute('data-processed');
          });
          mermaid.run();
        }
      }

      var theme = localStorage.getItem('dolphin-theme') || 'auto';
      applyTheme(theme);

      document.querySelectorAll('.theme-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          applyTheme(this.dataset.theme);
        });
      });
    })();
  </script>
</body>
</html>
