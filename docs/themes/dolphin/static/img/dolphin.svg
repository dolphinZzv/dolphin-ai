<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Body - jumping arc like the dolphin emoji -->
  <path d="M18 76
           C14 56, 24 36, 46 34
           C62 33, 80 24, 102 10
           C96 26, 84 44, 70 56
           C56 68, 32 80, 22 80
           C20 80, 18 78, 18 76Z"
        fill="currentColor"/>
  <!-- Belly (lighter) -->
  <path d="M28 78
           C38 80, 54 72, 66 62
           C58 70, 42 76, 28 78Z"
        fill="currentColor" opacity="0.15"/>
  <!-- Dorsal fin -->
  <path d="M42 36
           C40 20, 50 8, 56 6
           C52 14, 52 26, 48 36Z"
        fill="currentColor"/>
  <!-- Tail -->
  <path d="M102 10
           C108 2, 112 -2, 110 -6
           C108 0, 104 6, 100 10
           C104 16, 108 22, 110 26
           C112 24, 108 18, 102 10Z"
        fill="currentColor"/>
  <!-- Happy eye -->
  <path d="M28 60 C30 56, 34 56, 36 60" stroke="var(--bg, #fff)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Smile -->
  <path d="M22 70 C26 78, 38 80, 44 74" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.7"/>
  <!-- Blush -->
  <ellipse cx="34" cy="68" rx="5" ry="3" fill="currentColor" opacity="0.12"/>
  <!-- Pectoral fin -->
  <path d="M48 58 C44 66, 38 72, 34 74 C40 70, 46 64, 48 58Z" fill="currentColor" opacity="0.65"/>
  <!-- Water splash left -->
  <ellipse cx="14" cy="82" rx="8" ry="4" fill="currentColor" opacity="0.2"/>
  <circle cx="8" cy="78" r="2.5" fill="currentColor" opacity="0.2"/>
  <circle cx="18" cy="78" r="2" fill="currentColor" opacity="0.2"/>
  <!-- Water splash right -->
  <ellipse cx="78" cy="54" rx="6" ry="3" fill="currentColor" opacity="0.2"/>
  <circle cx="72" cy="52" r="2" fill="currentColor" opacity="0.2"/>
  <circle cx="84" cy="50" r="2" fill="currentColor" opacity="0.2"/>
  <!-- Wave -->
  <path d="M2 98 C16 92, 30 100, 46 94 C62 88, 76 100, 92 94 C106 88, 118 96, 118 96" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.25"/>
</svg>
