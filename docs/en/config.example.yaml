# dolphin configuration
# Copy to .dolphin/config.yaml, edit, and restart.
# All settings have defaults — uncomment only what you need to change.

# ── LLM Provider ──────────────────────────────────────────
# Single provider (legacy): set via top-level fields or DZ_LLM_* env vars.
# Multi-provider: set `providers` list below. Startup tries each in order
# with a health check and uses the first that responds.
llm:
  # Legacy single-provider fields (used when `providers` is empty):
  type: openai                # "openai" or "anthropic"
  base_url: https://api.openai.com/v1
  model: gpt-4o               # model name, or set via DZ_LLM_MODEL env
  api_key: ""                 # set via DZ_LLM_API_KEY env var (recommended)
  max_tokens: 4096
  max_context_tokens: 1048576 # trigger compression above 70% of this
  temperature: 0.7            # 0.0–2.0
  max_sub_turns: 10           # max tool-call feedback loops per user turn
  compress_mode: drop         # "drop" | "segment" | "tiered" | "incremental" | "topic"
  segment_merge_limit: 100    # segments before recursive merge (segment mode)

  # Multi-provider: uncomment and fill in API keys, startup picks first working one.
  # providers:
  #   - name: deepseek
  #     type: openai
  #     api_key: ""
  #     base_url: https://api.deepseek.com/v1
  #     model: deepseek-v4-flash
  #   - name: minimax
  #     type: openai
  #     api_key: ""
  #     base_url: https://api.minimax.chat/v1
  #     model: MiniMax-M2.7
  #   - name: glm
  #     type: openai
  #     api_key: ""
  #     base_url: https://open.bigmodel.cn/api/paas/v4
  #     model: glm-5
  #   - name: qwen
  #     type: openai
  #     api_key: ""
  #     base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  #     model: qwen3.6-max-preview

# ── Sessions ──────────────────────────────────────────────
session:
  dir: .dolphin/sessions
  max_loop: 50                # max turns per session
  summary: true               # auto-generate session summary
  max_age: 24h                # auto-delete sessions older than this
  resume: false               # prompt to resume last session on start

# ── MCP Tools ─────────────────────────────────────────────
mcp:
  shell:
    enabled: true
    timeout_seconds: 30
    priority: 10
  cdp:
    enabled: true             # browser automation (Chrome DevTools Protocol)
    headless: true
    priority: 1000
    idle_timeout: 300         # seconds before auto-closing idle browser
  email:
    enabled: true             # email send/search/fetch MCP tool (uses transport.email config)
    priority: 500
  servers: {}                 # external MCP servers, e.g. myserver: {type: stdio, command: npx, args: [...]}
  repos: []                   # manifest repos, e.g. ["dolphinv/mcp"]

# ── Agent Pool ────────────────────────────────────────────
agent_pool:
  max_concurrency: 5          # max simultaneous sub-agent tasks
  default_timeout: 300        # seconds per task
  workspace_dir: .dolphin/workspaces
  idle_timeout: 600           # seconds before reaping idle temp agents
  max_pending_results: 10
  max_pending_result_len: 500 # chars per result in prompt, 0 = no truncation

# ── Skills ────────────────────────────────────────────────
skills:
  dir: .dolphin/skills
  max_top: 10                 # skills shown in LLM context
  repos: []                   # manifest repos, e.g. ["dolphinv/skills"]

# ── Transports ────────────────────────────────────────────
transport:
  stdio:
    enabled: true
  ssh:
    enabled: false
    addr: ":2222"
    host_key: "~/.ssh/id_ed25519"
    username: dolphin
    password: ""              # auto-generated on first SSH start
  mqtt:
    enabled: false
    broker: tcp://localhost:1883
    topic: dolphin/agent/command
    response_topic: dolphin/agent/response
    client_id: dolphin-agent
    embedded: true
    embedded_addr: :1883
  email:
    enabled: false
    smtp_host: ""
    smtp_port: 587
    imap_host: ""
    imap_port: 993
    username: ""
    password: ""              # set via DZ_EMAIL_PASSWORD env var
    from: ""
    use_tls: true
    poll_interval: 10s

# ── Crontab ───────────────────────────────────────────────
crontab:
  file: .dolphin/CRONTAB.md
  check_interval: 30s

# ── Diary (session summary aggregation) ───────────────────
diary:
  dir: .dolphin/diary
  max_day_sessions: 200       # sessions per day before pruning oldest
  max_week_days: 7            # days per week before pruning oldest
  max_month_weeks: 5          # weeks per month before pruning oldest
  max_year_months: 12         # months per year before pruning oldest
  max_total_mb: 500           # total diary size limit, deletes oldest year

# ── Plugins (hooks + events) ────────────────────────────────
# dolphin has two extension systems:
#
#   Hook  (sync)  — intercept agent loop at specific points.
#                   Return error to abort the flow at abortable points.
#   Event (async) — subscribe to notifications dispatched in background.
#                   Built-in delivery: webhook (HTTP POST), JSONL log.
#
# Both can be driven by script plugins placed in the plugins directory.

plugins:
  enabled: true
  dir: ~/.dolphin/plugins/       # directory for script plugins

  # ── Event webhook ──────────────────────────────────────────
  # POST selected events as JSON to an HTTP endpoint.
  webhook_url: ""                 # e.g. "https://hooks.example.com/dolphin"
  webhook_events: ["*"]           # event types to deliver, ["*"] = all

  # Available events:
  #   session:created    session:ended
  #   user:message       llm:response
  #   tool:called        tool:completed
  #   compression        error
  #   heartbeat          agent:dispatched   agent:completed
  #   skill:loaded
  #
  # Example: filter to only tool and agent events:
  # webhook_events: ["tool:called", "tool:completed", "agent:dispatched", "agent:completed"]

  # ── Heartbeat ──────────────────────────────────────────────
  # Emit a heartbeat event every N turns (0 = off).
  heartbeat_turns: 0              # e.g. 5 = heartbeat every 5 turns

# ── Hook plugins (script examples) ─────────────────────────
# Place executable scripts or .md files in ~/.dolphin/plugins/.
# Each script receives the hook context as JSON on stdin and
# may return a modified JSON object on stdout.
#
# Available hook points († = abortable):
#   session:start    session:end      user:input†
#   llm:before†      llm:after        tool:before†
#   tool:after       response:before  error
#
# ── Example hook scripts ────────────────────────────────────
#
# --- ~/.dolphin/plugins/audit-input.sh ---
# #!/bin/bash
# # Log every user input before it reaches the LLM.
# # Hook point: user:input
# read -r json
# echo "$json" | jq '.user_input' >> /var/log/dolphin-input.log
# echo "$json"    # pass through unmodified
#
# --- ~/.dolphin/plugins/session-start.sh ---
# #!/bin/bash
# # Notify external system when a session starts.
# # Hook point: session:start
# read -r json
# session_id=$(echo "$json" | jq -r '.session_id')
# curl -sf -X POST "https://hooks.example.com/session/start" \
#   -H "Content-Type: application/json" \
#   -d "{\"session_id\": \"$session_id\"}" &>/dev/null
# echo "$json"

# ── Observability ─────────────────────────────────────────
log_level: info
log_file: .dolphin/logs/agent.log

pprof:
  enabled: false
  addr: ":6060"

metrics:
  enabled: false
  addr: ":9090"
