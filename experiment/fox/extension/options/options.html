<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fox Settings</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { max-width: 500px; margin: 0 auto; padding: 24px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; font-size: 14px; color: #333; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 24px; color: #e65100; }
  h2 { font-size: 14px; font-weight: 600; margin: 20px 0 8px; color: #555; }
  .setting { margin-bottom: 16px; }
  .setting label { display: block; font-weight: 500; margin-bottom: 4px; }
  .setting input[type="text"], .setting input[type="number"] { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; }
  .setting select { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; background: #fff; }
  .setting .hint { font-size: 11px; color: #888; margin-top: 2px; }
  .setting input[type="checkbox"] { margin-right: 6px; }
  .domain-list { margin-top: 8px; }
  .domain-row { display: flex; gap: 6px; margin-bottom: 4px; align-items: center; }
  .domain-row input { flex: 1; padding: 6px 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; }
  .domain-row button { padding: 6px 10px; border: 1px solid #ddd; border-radius: 4px; background: #fff; cursor: pointer; font-size: 13px; }
  .domain-row button:hover { background: #fee; border-color: #faa; }
  .add-btn { margin-top: 8px; padding: 6px 12px; border: 1px dashed #ccc; border-radius: 4px; background: #fff; cursor: pointer; font-size: 13px; color: #666; }
  .add-btn:hover { border-color: #e65100; color: #e65100; }
  .save-bar { margin-top: 24px; padding-top: 16px; border-top: 1px solid #eee; display: flex; gap: 8px; }
  .btn { padding: 10px 20px; border: none; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; }
  .btn-primary { background: #e65100; color: #fff; }
  .btn-primary:hover { background: #bf360c; }
  .btn-danger { background: #fff; color: #e53935; border: 1px solid #fcc; }
  .btn-danger:hover { background: #fee; }
  .toast { position: fixed; bottom: 24px; right: 24px; padding: 10px 20px; background: #333; color: #fff; border-radius: 6px; font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<h1>🦊 Fox Settings</h1>

<h2>Connection</h2>
<div class="setting">
  <label>Server Address</label>
  <input type="text" id="serverAddr" placeholder="http://127.0.0.1:9200">
  <div class="hint">Default: http://127.0.0.1:9200</div>
</div>

<h2>Domain Filtering</h2>
<div class="setting">
  <label>Filter Mode</label>
  <select id="domainMode">
    <option value="blocklist">Blocklist (record all except listed)</option>
    <option value="allowlist">Allowlist (only record listed domains)</option>
    <option value="off">Off (record all domains)</option>
  </select>
</div>
<div class="setting">
  <label>Domains</label>
  <div class="domain-list" id="domainList"></div>
  <button class="add-btn" id="addDomain">+ Add Domain</button>
</div>

<h2>Privacy</h2>
<div class="setting">
  <label><input type="checkbox" id="redactInputs" checked> Redact input values (record length only)</label>
</div>
<div class="setting">
  <label><input type="checkbox" id="stripQueryParams" checked> Strip URL query parameters</label>
</div>
<div class="setting">
  <label>Text Truncation (characters)</label>
  <input type="number" id="textTruncate" value="100" min="20" max="500">
</div>

<h2>Data Retention</h2>
<div class="setting">
  <label>Max Sessions</label>
  <input type="number" id="maxSessions" value="50" min="5" max="500">
</div>
<div class="setting">
  <label>Retention (days)</label>
  <input type="number" id="retentionDays" value="7" min="1" max="365">
</div>

<div class="save-bar">
  <button class="btn btn-primary" id="saveBtn">Save Settings</button>
  <button class="btn btn-danger" id="clearBtn">Clear All Data</button>
</div>

<div class="toast" id="toast"></div>

<script src="options.js"></script>
</body>
</html>
